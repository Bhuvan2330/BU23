<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Management Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-shell">
    <header>
      <h1>Project Management Portal</h1>
      <p>Log in to manage onboarding, requirements, and the project kickoff.</p>
    </header>
    <main>
      <form id="loginForm" class="login-form" onsubmit="return login('pm')">
        <label>Email</label>
        <input type="email" id="email" required placeholder="pm@example.com">
        <label>Password</label>
        <input type="password" id="password" required placeholder="pm123">
        <button type="submit">Log in as PM</button>
        <p class="form-note">Demo credentials: pm@example.com / pm123</p>
        <p id="errorMessage" class="error-message"></p>
      </form>
      <p><a href="index.html">Back to role selection</a></p>
    </main>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
